<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Perfil - NOT Flix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(black, rgb(85, 84, 84));
            font-family: 'Roboto', Arial, sans-serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(97, 1, 206, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-button:hover {
            color: #E50914;
        }

        .logo-small {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo-not {
            color: #ffffff;
        }

        .logo-flix {
            color: #E50914;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid rgba(97, 1, 206, 0.5);
            border-radius: 16px;
            padding: 40px;
            width: min(500px, 90vw);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(97, 1, 206, 0.3);
            margin-top: 60px;
        }

        h1 {
            color: #E50914;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        /* EDITABLE PHOTO STYLES */
        .editable-photo {
            position: relative;
            width: clamp(130px, 25vw, 180px);
            height: clamp(130px, 25vw, 180px);
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .editable-photo:hover {
            box-shadow: 0 0 20px rgba(97, 1, 206, 0.4);
            transform: scale(1.05);
        }

        .editable-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
        }

        .edit-avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            opacity: 0;
            background: rgba(0, 0, 0, 0.6);
            transition: opacity 0.3s ease;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
        }

        .editable-photo:hover .edit-avatar-overlay {
            opacity: 1;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            color: #ddd;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .edit-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(97, 1, 206, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-family: 'Roboto', Arial, sans-serif;
            transition: all 0.3s ease;
        }

        .edit-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(97, 1, 206, 0.7);
            box-shadow: 0 0 10px rgba(97, 1, 206, 0.3);
        }

        .edit-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .save-button {
            background: linear-gradient(135deg, #E50914 0%, #c20812 100%);
            color: white;
        }

        .save-button:hover {
            background: linear-gradient(135deg, #c20812 0%, #a00610 100%);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .delete-button {
            background: rgba(229, 9, 20, 0.2);
            color: #E50914;
            border: 1px solid rgba(229, 9, 20, 0.5);
        }

        .delete-button:hover {
            background: rgba(229, 9, 20, 0.4);
            border-color: #E50914;
        }

        .info-text {
            font-size: 11px;
            color: #888;
            margin-top: 12px;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            .container {
                padding: 30px 20px;
                margin-top: 80px;
            }

            .header {
                top: 10px;
                left: 10px;
            }

            h1 {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="back-button" id="back-button" aria-label="Voltar">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>
        <div class="logo-small">
            <span class="logo-not">NOT</span> <span class="logo-flix">FLIX</span>
        </div>
    </div>

    <div class="container">
        <h1 id="profile-name-title">Crie um novo Perfil</h1>
        <p class="subtitle">Adicione uma foto e nome para seu novo perfil</p>

        <div class="section">
            <label class="section-label">Foto do Perfil</label>
            <div class="editable-photo" id="create-photo">
                <input type="file" id="create-profile-photo" accept="image/*" style="display: none;">
                <img id="create-profile-avatar" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Foto do perfil" />
                <div class="edit-avatar-overlay" title="Clique para adicionar foto">
                    <i class="fas fa-plus"></i>
                </div>
            </div>
            <div class="info-text">
                💡 Clique na foto para adicionar uma imagem
            </div>
        </div>

        <div class="input-group">
            <label class="input-label" for="create-profile-name">Nome do Perfil</label>
            <input type="text" id="create-profile-name" class="edit-input" maxlength="20" placeholder="Digite o nome do perfil">
        </div>

        <div class="button-group">
            <button class="save-button" id="create-save-button">
                <i class="fas fa-check"></i> Criar
            </button>
            <button class="delete-button" id="create-cancel-button">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
    </div>

    <script src="js/profiles-utils.js"></script>
    <script src="js/create-profile.js"></script>
</body>

</html>
